<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'JetBrains Mono', 'Courier New', monospace">
  <rect width="800" height="420" fill="#0a0a1a" rx="8"/>

  <!-- Step 1 -->
  <g opacity="0">
    <rect x="250" y="20" width="300" height="36" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="400" y="43" fill="#f0f0f0" font-size="12" text-anchor="middle">paste a URL or type a thesis</text>
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Arrow 1 -->
  <line x1="400" y1="56" x2="400" y2="76" stroke="#3b82f6" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.3s" fill="freeze"/>
  </line>
  <polygon points="394,74 400,82 406,74" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.3s" fill="freeze"/>
  </polygon>

  <!-- Step 2 -->
  <g opacity="0">
    <rect x="250" y="82" width="300" height="36" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="400" y="105" fill="#f0f0f0" font-size="12" text-anchor="middle">read the source</text>
    <text x="580" y="105" fill="#555568" font-size="10">tweet, video, article</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Arrow 2 -->
  <line x1="400" y1="118" x2="400" y2="138" stroke="#3b82f6" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
  </line>
  <polygon points="394,136 400,144 406,136" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
  </polygon>

  <!-- Step 3 -->
  <g opacity="0">
    <rect x="250" y="144" width="300" height="36" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="400" y="167" fill="#f0f0f0" font-size="12" text-anchor="middle">find tradeable ideas</text>
    <text x="580" y="167" fill="#555568" font-size="10">1 to 5 per source</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Arrow 3 -->
  <line x1="400" y1="180" x2="400" y2="200" stroke="#3b82f6" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
  </line>
  <polygon points="394,198 400,206 406,198" fill="#3b82f6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
  </polygon>

  <!-- Step 4 -->
  <g opacity="0">
    <rect x="250" y="206" width="300" height="36" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="400" y="229" fill="#f0f0f0" font-size="12" text-anchor="middle">research each one</text>
    <text x="580" y="229" fill="#555568" font-size="10">web search, discovery</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Branching arrows -->
  <g opacity="0">
    <line x1="400" y1="242" x2="300" y2="270" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="400" y1="242" x2="400" y2="270" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="400" y1="242" x2="500" y2="270" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="294,268 300,276 306,268" fill="#3b82f6"/>
    <polygon points="394,268 400,276 406,268" fill="#3b82f6"/>
    <polygon points="494,268 500,276 506,268" fill="#3b82f6"/>
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Three venue cards -->
  <g opacity="0">
    <rect x="230" y="276" width="120" height="30" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="290" y="295" fill="#c8c8d0" font-size="10" text-anchor="middle">stocks</text>
    <rect x="360" y="276" width="120" height="30" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="420" y="295" fill="#c8c8d0" font-size="10" text-anchor="middle">perps</text>
    <rect x="490" y="276" width="120" height="30" fill="#0f0f22" stroke="#1a1a2e" rx="4"/>
    <text x="550" y="295" fill="#c8c8d0" font-size="10" text-anchor="middle">prediction mkts</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Converging arrows -->
  <g opacity="0">
    <line x1="300" y1="306" x2="400" y2="334" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="400" y1="306" x2="400" y2="334" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="540" y1="306" x2="400" y2="334" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="394,332 400,340 406,332" fill="#3b82f6"/>
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- Final step -->
  <g opacity="0">
    <rect x="250" y="340" width="300" height="36" fill="#0f0f22" stroke="#2ecc71" stroke-width="1.5" rx="4"/>
    <text x="400" y="363" fill="#2ecc71" font-size="12" text-anchor="middle" font-weight="700">pick best fit, lock price, post</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/>
  </g>

  <!-- P&L tracking label -->
  <g opacity="0">
    <text x="400" y="400" fill="#555568" font-size="11" text-anchor="middle">P&amp;L tracks from here</text>
    <rect x="360" y="406" width="80" height="3" fill="#2ecc71" rx="1">
      <animate attributeName="width" from="0" to="80" begin="4.2s" dur="0.8s" fill="freeze"/>
    </rect>
    <animate attributeName="opacity" from="0" to="1" begin="4s" dur="0.4s" fill="freeze"/>
  </g>
</svg>
