<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="340" fill="#0a0a1a" rx="8"/>

  <!-- Source card -->
  <rect x="30" y="30" width="280" height="280" fill="#0f0f22" stroke="#1a1a2e" rx="6"/>
  <text x="50" y="60" fill="#555568" font-size="10" letter-spacing="2">SOURCE</text>
  <text x="50" y="90" fill="#3b82f6" font-size="13">@kansasangus</text>
  <line x1="50" y1="105" x2="280" y2="105" stroke="#1a1a2e"/>
  <text x="50" y="130" fill="#c8c8d0" font-size="12">"Cow/calf markets</text>
  <text x="50" y="150" fill="#c8c8d0" font-size="12"> beginning to get</text>
  <text x="50" y="170" fill="#c8c8d0" font-size="12"> wild"</text>

  <!-- Animated arrow -->
  <g filter="url(#glow)">
    <line x1="330" y1="170" x2="460" y2="170" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <polygon points="460,164 474,170 460,176" fill="#3b82f6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Trade card -->
  <rect x="490" y="30" width="280" height="280" fill="#0f0f22" stroke="#1a1a2e" rx="6"/>
  <text x="510" y="60" fill="#555568" font-size="10" letter-spacing="2">TRADE CARD</text>
  <text x="510" y="90" fill="#3b82f6" font-size="13">@kansasangus</text>
  <text x="700" y="90" fill="#555568" font-size="10" text-anchor="end">Mar 18</text>
  <line x1="510" y1="105" x2="740" y2="105" stroke="#1a1a2e"/>

  <text x="510" y="128" fill="#c8c8d0" font-size="11">"Cow/calf is just beginning</text>
  <text x="510" y="144" fill="#c8c8d0" font-size="11"> to get wild"</text>

  <line x1="510" y1="158" x2="740" y2="158" stroke="#1a1a2e"/>

  <!-- Chain steps with fade-in animation -->
  <g>
    <text x="510" y="178" fill="#555568" font-size="11">1</text>
    <text x="530" y="178" fill="#c8c8d0" font-size="11">Severe drought across</text>
    <text x="530" y="193" fill="#c8c8d0" font-size="11">Southern Plains</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.6s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text x="510" y="213" fill="#555568" font-size="11">2</text>
    <text x="530" y="213" fill="#c8c8d0" font-size="11">Herd liquidation shrinks</text>
    <text x="530" y="228" fill="#c8c8d0" font-size="11">supply</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.6s" fill="freeze"/>
  </g>
  <g opacity="0">
    <text x="510" y="248" fill="#555568" font-size="11">3</text>
    <text x="530" y="248" fill="#c8c8d0" font-size="11">DBA holds cattle &amp; grain</text>
    <text x="530" y="263" fill="#c8c8d0" font-size="11">exposed to same drought</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.6s" fill="freeze"/>
  </g>

  <!-- Trade result with pulse -->
  <line x1="510" y1="278" x2="740" y2="278" stroke="#1a1a2e"/>
  <g opacity="0">
    <text x="510" y="300" fill="#f0f0f0" font-size="13" font-weight="700">DBA  LONG</text>
    <text x="700" y="300" fill="#2ecc71" font-size="13" font-weight="700" text-anchor="end">+0.3%</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.6s" fill="freeze"/>
  </g>
</svg>
