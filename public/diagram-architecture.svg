<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="'JetBrains Mono', 'Courier New', monospace">
  <rect width="800" height="200" fill="#0a0a1a" rx="8"/>

  <!-- Skill box -->
  <rect x="40" y="30" width="320" height="140" fill="#0f0f22" stroke="#1a1a2e" rx="6"/>
  <text x="60" y="58" fill="#555568" font-size="10" letter-spacing="2">THE SKILL</text>

  <g opacity="0"><text x="60" y="82" fill="#c8c8d0" font-size="11">reads sources</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.3s" fill="freeze"/></g>
  <g opacity="0"><text x="60" y="102" fill="#c8c8d0" font-size="11">extracts theses</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/></g>
  <g opacity="0"><text x="60" y="122" fill="#c8c8d0" font-size="11">researches instruments</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"/></g>
  <g opacity="0"><text x="60" y="142" fill="#c8c8d0" font-size="11">explains reasoning</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/></g>
  <text x="60" y="162" fill="#555568" font-size="10">runs in your agent</text>

  <!-- Animated arrows -->
  <g opacity="0">
    <line x1="370" y1="68" x2="430" y2="68" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="428,63 436,68 428,73" fill="#3b82f6"/>
    <line x1="370" y1="92" x2="430" y2="92" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="428,87 436,92 428,97" fill="#3b82f6"/>
    <line x1="370" y1="116" x2="430" y2="116" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="428,111 436,116 428,121" fill="#3b82f6"/>
    <line x1="370" y1="140" x2="430" y2="140" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="428,135 436,140 428,145" fill="#3b82f6"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Platform box -->
  <g opacity="0">
    <rect x="440" y="30" width="320" height="140" fill="#0f0f22" stroke="#2ecc71" stroke-width="1.5" rx="6"/>
    <text x="460" y="58" fill="#2ecc71" font-size="10" letter-spacing="2">PASTE.MARKETS</text>
    <text x="460" y="82" fill="#c8c8d0" font-size="11">tracks P&amp;L</text>
    <text x="460" y="102" fill="#c8c8d0" font-size="11">streams progress live</text>
    <text x="460" y="122" fill="#c8c8d0" font-size="11">publishes trade cards</text>
    <text x="460" y="142" fill="#c8c8d0" font-size="11">saves to your profile</text>
    <text x="460" y="162" fill="#555568" font-size="10">shareable link</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
